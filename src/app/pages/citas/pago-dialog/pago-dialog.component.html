<mat-card class="pago-dialog-card">

  <mat-card-header>
    <mat-card-title>Pagar Cita</mat-card-title>
    <mat-card-subtitle>
      {{ data.cita.peluquero.usuario.nombre }} -
      {{ data.cita.fecha | date:'short' }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>

    <div *ngIf="data.cita.estado === 'pagada'" class="estado-pagada">
      ✅ Esta cita ya fue pagada
    </div>

    <form [formGroup]="pagoForm" *ngIf="data.cita.estado !== 'pagada'">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Monto</mat-label>
        <input matInput type="number" formControlName="monto">

        <mat-error *ngIf="pagoForm.get('monto')?.hasError('required')">
          El monto es obligatorio
        </mat-error>

        <mat-error *ngIf="pagoForm.get('monto')?.hasError('min')">
          El monto debe ser mayor que 0
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Método de pago</mat-label>
        <mat-select formControlName="metodo">
          <mat-option value="efectivo">💵 Efectivo</mat-option>
          <mat-option value="tarjeta">💳 Tarjeta</mat-option>
          <mat-option value="transferencia">🔄 Transferencia</mat-option>
        </mat-select>

        <mat-error *ngIf="pagoForm.get('metodo')?.hasError('required')">
          Selecciona un método de pago
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Observaciones</mat-label>
        <textarea matInput formControlName="observaciones" rows="3"></textarea>
      </mat-form-field>

    </form>

  </mat-card-content>

  <mat-card-actions align="end">

    <button mat-stroked-button color="warn" (click)="cancelar()">
      Cancelar
    </button>

    <button mat-raised-button color="primary" *ngIf="data.cita.estado !== 'pagada'"
      [disabled]="pagoForm.invalid || loading" (click)="pagar()">

      <span *ngIf="!loading">Pagar</span>
      <span *ngIf="loading">Procesando...</span>

    </button>

  </mat-card-actions>

</mat-card>
