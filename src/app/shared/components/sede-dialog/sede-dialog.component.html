<h2 mat-dialog-title class="dialog-title">
  <mat-icon color="primary">business</mat-icon>
  <span>{{ titulo }}</span>
</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">
  <mat-form-field appearance="outline" class="w-full mb-4">
    <mat-label>Nombre de la Sede</mat-label>
    <mat-icon matPrefix class="form-icon">store</mat-icon>
    <input matInput formControlName="nombre" placeholder="Ej. Sede Centro" />
    <mat-error *ngIf="form.get('nombre')?.hasError('required')">
      El nombre es obligatorio
    </mat-error>
    <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">
      Mínimo 3 caracteres
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-full mb-4">
    <mat-label>Dirección</mat-label>
    <mat-icon matPrefix class="form-icon">location_on</mat-icon>
    <input
      matInput
      formControlName="direccion"
      placeholder="Ej. Calle 10 #5-23"
    />
    <mat-error *ngIf="form.get('direccion')?.hasError('required')">
      La dirección es obligatoria
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-full mb-4">
    <mat-label>Teléfono</mat-label>
    <mat-icon matPrefix class="form-icon">phone</mat-icon>
    <input matInput formControlName="telefono" placeholder="Ej. 3104567890" />
    <mat-error *ngIf="form.get('telefono')?.hasError('required')">
      El teléfono es obligatorio
    </mat-error>
    <mat-error *ngIf="form.get('telefono')?.hasError('pattern')">
      Número inválido (7 a 10 dígitos)
    </mat-error>
  </mat-form-field>

  <div class="toggle-container mb-4">
    <mat-slide-toggle formControlName="estado" color="primary">Sede Activa</mat-slide-toggle>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()" [disabled]="cargando">
    Cancelar
  </button>
  <button
    mat-flat-button
    color="primary"
    (click)="guardar()"
    [disabled]="form.invalid || cargando"
  >
    {{ data ? 'Actualizar' : 'Crear' }}
  </button>
</mat-dialog-actions>
