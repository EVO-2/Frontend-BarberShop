<h2 mat-dialog-title class="flex items-center justify-between">
  Movimientos del equipo
  <button mat-icon-button (click)="cerrar()">
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-dialog-content>
  <div class="mb-3" style="display:flex; gap:12px; align-items:center;">
    <mat-form-field appearance="outline" style="min-width:160px;">
      <mat-label>Tipo</mat-label>
      <mat-select [formControl]="tipoFiltro" (selectionChange)="aplicarFiltros()">
        <mat-option value="">Todos</mat-option>
        <mat-option *ngFor="let t of tipos" [value]="t">{{ t | titlecase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha inicio</mat-label>
      <input matInput [matDatepicker]="picker1" [formControl]="fechaInicioFiltro">
      <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
      <mat-datepicker #picker1></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha fin</mat-label>
      <input matInput [matDatepicker]="picker2" [formControl]="fechaFinFiltro">
      <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
      <mat-datepicker #picker2></mat-datepicker>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="aplicarFiltros()">Filtrar</button>
    <button mat-stroked-button (click)="tipoFiltro.setValue(''); fechaInicioFiltro.setValue(null); fechaFinFiltro.setValue(null); aplicarFiltros();">Limpiar</button>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%; margin-top:12px;">

    <!-- Tipo -->
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let m">{{ m.tipo }}</td>
    </ng-container>

    <!-- From Sede -->
    <ng-container matColumnDef="fromSede">
      <th mat-header-cell *matHeaderCellDef>Origen</th>
      <td mat-cell *matCellDef="let m">{{ m.fromSede?.nombre || '-' }}</td>
    </ng-container>

    <!-- To Sede -->
    <ng-container matColumnDef="toSede">
      <th mat-header-cell *matHeaderCellDef>Destino</th>
      <td mat-cell *matCellDef="let m">{{ m.toSede?.nombre || '-' }}</td>
    </ng-container>

    <!-- Fecha inicio -->
    <ng-container matColumnDef="fechaInicio">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let m">{{ m.fechaInicio | date:'short' }}</td>
    </ng-container>

    <!-- Descripción -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let m">{{ m.descripcion || '-' }}</td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let m">
        <button mat-icon-button (click)="verDetalle(m)" title="Ver detalle">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cerrar()">Cerrar</button>
</mat-dialog-actions>
