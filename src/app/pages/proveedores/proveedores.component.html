<div class="header-container">
  <h2>Administración de Proveedores</h2>
  <button mat-flat-button color="primary" (click)="abrirDialogo()">
    <mat-icon>add</mat-icon> Nuevo Proveedor
  </button>
</div>

<mat-card>
  <mat-card-content>
    <div class="loading-shade" *ngIf="cargando">
      <mat-spinner></mat-spinner>
    </div>

    <table mat-table [dataSource]="proveedores" class="mat-elevation-z0">
      
      <!-- Nombre Column -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Empresa / Proveedor </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <!-- Contacto Column -->
      <ng-container matColumnDef="contacto">
        <th mat-header-cell *matHeaderCellDef> Contacto </th>
        <td mat-cell *matCellDef="let element"> {{element.contacto || 'N/A'}} </td>
      </ng-container>

      <!-- Telefono Column -->
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef> Teléfono </th>
        <td mat-cell *matCellDef="let element"> {{element.telefono || 'N/A'}} </td>
      </ng-container>

      <!-- Estado Column -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let element">
          <mat-slide-toggle [checked]="element.estado" (change)="cambiarEstado(element)" color="primary">
            {{ element.estado ? 'Activo' : 'Inactivo' }}
          </mat-slide-toggle>
        </td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="text-right">
          <button mat-icon-button color="primary" (click)="abrirDialogo(element)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminarProveedor(element._id)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5" style="text-align: center; padding: 20px;">
          No hay proveedores registrados.
        </td>
      </tr>
    </table>
  </mat-card-content>
</mat-card>
