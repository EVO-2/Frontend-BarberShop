<h2 mat-dialog-title>{{ esEdicion ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="guardar()" class="form-container">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Ej. Bebidas" required>
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">El nombre es requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" rows="3" placeholder="Opcional"></textarea>
    </mat-form-field>

    <mat-slide-toggle formControlName="estado" color="primary">
      Activo
    </mat-slide-toggle>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cerrar()" [disabled]="loading">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()" [disabled]="loading || form.invalid">
    <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">Guardar</span>
  </button>
</mat-dialog-actions>
