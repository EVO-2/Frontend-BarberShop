<div class="layout-container">
  <app-sidebar class="sidebar"></app-sidebar>

  <div class="content">
    <!-- Barra superior -->
    <header class="header">
      <!-- ⏰ Fecha y hora -->
      <div class="fecha-hora">{{ fechaHoraActual }}</div>

      <div class="user-info">
        <!-- Botón de imagen con menú desplegable -->
        <button mat-icon-button [matMenuTriggerFor]="perfilMenu" class="avatar-btn">
          <img
            *ngIf="fotoPerfil"
            [src]="fotoPerfil"
            alt="Foto de perfil"
            class="avatar"
          />
        </button>
        <span class="nombre">{{ nombreUsuario }}</span>
      </div>

      <!-- Menú desplegable del usuario -->
      <mat-menu #perfilMenu="matMenu">
        <button mat-menu-item (click)="editarPerfil()">
          <mat-icon>edit</mat-icon>
          <span>Editar perfil</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </header>

    <!-- Contenido principal -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

    <!-- Pie de página -->
    <footer class="footer">
      <p>© 2025 Barbería JEVO</p>
    </footer>
  </div>
</div>
