<div class="card p-4">

  <h2 class="mb-4">Listado de Equipos</h2>

  <!-- Botón Crear Equipo -->
  <button mat-raised-button color="primary" class="mb-4" (click)="crearEquipo()">
    Crear Equipo
  </button>

  <!-- FILTROS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">

    <mat-form-field appearance="outline">
      <mat-label>Tipo</mat-label>
      <mat-select [(ngModel)]="filtros.tipo" (selectionChange)="aplicarFiltros()">
        <mat-option value="">Todos</mat-option>
        <mat-option *ngFor="let t of tipos" [value]="t">{{ t | titlecase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select [(ngModel)]="filtros.estado" (selectionChange)="aplicarFiltros()">
        <mat-option value="">Todos</mat-option>
        <mat-option *ngFor="let e of estados" [value]="e">{{ e | titlecase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Sede</mat-label>
      <mat-select [(ngModel)]="filtros.sede" (selectionChange)="aplicarFiltros()">
        <mat-option value="">Todas</mat-option>
        <mat-option *ngFor="let s of sedes" [value]="s._id">{{ s.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>

  </div>

  <button mat-stroked-button color="primary" class="mb-3" (click)="limpiarFiltros()">Limpiar filtros</button>

  <!-- TABLA -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2 w-full">

    <!-- Nombre -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let row"> {{ row.nombre }} </td>
    </ng-container>

    <!-- Tipo -->
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef> Tipo </th>
      <td mat-cell *matCellDef="let row"> {{ row.tipo }} </td>
    </ng-container>

    <!-- Sede -->
    <ng-container matColumnDef="sede">
      <th mat-header-cell *matHeaderCellDef> Sede </th>
      <td mat-cell *matCellDef="let row"> {{ getNombreSede(row.sede) }} </td>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let row">
        <span class="badge" [ngClass]="row.estado">{{ row.estado }}</span>
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary" (click)="verMovimientos(row._id)">
          <mat-icon>history</mat-icon>
        </button>
        <button mat-icon-button color="accent" (click)="editarEquipo(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminarEquipo(row._id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Header y Row -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Mensaje cuando no hay equipos -->
    <tr *ngIf="dataSource.data.length === 0">
      <td [attr.colspan]="displayedColumns.length" class="text-center py-4">
        No hay equipos creados.
      </td>
    </tr>

  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>

</div>
