<div fxLayout="column" fxLayoutAlign="center center" class="signup-container">
  <mat-card class="mat-elevation-z4" style="width: 100%; max-width: 500px;">
    <mat-card-title>Crear cuenta</mat-card-title>
    <mat-card-content>
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" fxLayout="column" fxLayoutGap="20px">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo</mat-label>
          <input matInput formControlName="correo" type="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password" required />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="signupForm.invalid">
          Registrarse
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
