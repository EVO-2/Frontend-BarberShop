<div class="usuarios-container">
  <mat-card class="usuarios-card mat-elevation-z6">

    <!-- Header -->
    <div class="card-header">
      <div class="title">
        <mat-icon color="primary">group</mat-icon>
        <span>Gestión de Usuarios</span>
      </div>

      <button mat-flat-button color="primary" class="add-btn" (click)="abrirDialog()">
        <mat-icon>person_add</mat-icon>
        Nuevo Usuario
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <mat-form-field appearance="outline" class="filter-input">
        <mat-label>Buscar usuario</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (keyup)="aplicarFiltro($event)" placeholder="Nombre o correo" />
      </mat-form-field>
    </div>

    <!-- Tabla -->
    <div class="tabla-usuarios">
      <table mat-table [dataSource]="dataSource" matSort>

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let usuario; let i = index">
            {{ i + 1 }}
          </td>
        </ng-container>

        <!-- Nombre -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let usuario">
            <div class="user-name">
              <mat-icon>person</mat-icon>
              <span>{{ usuario.nombre }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Correo -->
        <ng-container matColumnDef="correo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo</th>
          <td mat-cell *matCellDef="let usuario">
            {{ usuario.correo }}
          </td>
        </ng-container>

        <!-- Rol -->
        <ng-container matColumnDef="rol">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Rol</th>
          <td mat-cell *matCellDef="let usuario">
            <span class="rol-chip">
              {{ usuario.rol.nombre | titlecase }}
            </span>
          </td>
        </ng-container>

        <!-- Estado -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let usuario">
            <span class="estado" [class.activo]="usuario.estado" [class.inactivo]="!usuario.estado">
              {{ usuario.estado ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let usuario" class="acciones">
            <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirDialog(usuario)">
              <mat-icon>edit</mat-icon>
            </button>

            <mat-slide-toggle [checked]="usuario.estado" (change)="cambiarEstado(usuario)" color="primary"
              matTooltip="Cambiar estado">
            </mat-slide-toggle>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>

    <!-- Paginador -->
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>

  </mat-card>
</div>
