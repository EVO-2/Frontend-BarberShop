<h2 mat-dialog-title>
  <mat-icon color="primary">inventory_2</mat-icon>
  {{ esEdicion ? 'Editar Producto' : 'Nuevo Producto' }}
</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nombre del producto</mat-label>
    <input matInput formControlName="nombre" />
    <mat-error *ngIf="form.get('nombre')?.hasError('required')">
      El nombre es obligatorio
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Categoría</mat-label>
    <mat-select formControlName="categoria">
      <mat-option *ngFor="let c of categorias" [value]="c._id">
        {{ c.nombre }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Proveedor</mat-label>
    <mat-select formControlName="proveedor">
      <mat-option *ngFor="let p of proveedores" [value]="p._id">
        {{ p.nombre }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Sede</mat-label>
    <mat-select formControlName="sede">
      <mat-option *ngFor="let s of sedes" [value]="s._id">
        {{ s.nombre }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Tipo</mat-label>
    <mat-select formControlName="tipo">
      <mat-option value="venta">Venta</mat-option>
      <mat-option value="uso_interno">Uso interno</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="grid-2">
    <mat-form-field appearance="outline">
      <mat-label>Cantidad</mat-label>
      <input matInput type="number" formControlName="cantidad" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Precio</mat-label>
      <input matInput type="number" formControlName="precio" />
    </mat-form-field>
  </div>

  <mat-slide-toggle formControlName="estado" color="primary">
    Activo
  </mat-slide-toggle>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cerrar()">Cancelar</button>

  <button mat-flat-button color="primary" [disabled]="loading || form.invalid" (click)="guardar()">

    <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>

    <span *ngIf="!loading">
      {{ esEdicion ? 'Actualizar' : 'Guardar' }}
    </span>

  </button>
</mat-dialog-actions>
