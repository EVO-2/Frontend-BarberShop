<h2 mat-dialog-title>{{ isEditing ? 'Editar Equipo' : 'Crear Equipo' }}</h2>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content class="grid gap-4">

    <!-- Nombre -->
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre">
    </mat-form-field>

    <!-- Tipo -->
    <mat-form-field appearance="outline">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="tipo">
        <mat-option *ngFor="let t of tipos" [value]="t">{{ t | titlecase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Estado -->
    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        <mat-option *ngFor="let e of estados" [value]="e">{{ e | titlecase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Sede -->
    <mat-form-field appearance="outline">
      <mat-label>Sede</mat-label>
      <mat-select formControlName="sede">
        <mat-option *ngFor="let s of sedes" [value]="s._id">{{ s.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      {{ isEditing ? 'Actualizar' : 'Crear' }}
    </button>
  </mat-dialog-actions>
</form>
